<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>Albert Einstein</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="app">

  <div class="scanline"></div>

  <header>
    <div class="brand">
      <div class="reactor" aria-hidden="true">
        <span class="reactor-core"></span>
      </div>
      <div class="brand-text">
        <div class="logo">ALBERT EINSTEIN</div>
        <div class="status"><span id="statusLabel">online</span></div>
      </div>
    </div>

    <div class="header-actions">
      <button id="clearBtn" class="icon-btn" title="Clear conversation" aria-label="Clear conversation">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6h16Z"/></svg>
      </button>
      <button id="themeBtn" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <div id="chat" class="chat">
    <div class="bot-row">
      <div class="avatar" aria-hidden="true">AL</div>
      <div class="bubble-wrap">
        <div class="bot">Hey there!</div>
        <div class="meta">ALBERT · now</div>
      </div>
    </div>
  </div>

  <button id="scrollBtn" class="scroll-btn" aria-label="Scroll to latest message">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m0 0-6-6m6 6 6-6"/></svg>
  </button>

  <form id="form">
    <textarea
      id="message"
      rows="1"
      placeholder="Message..."
      autocomplete="off"
    ></textarea>

    <button id="micBtn" type="button" class="icon-btn action-btn" title="Voice Input" aria-label="Voice input">
      <svg class="mic-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>

    <button id="sendBtn" type="submit" aria-label="Send message">
      <svg class="send-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"/></svg>
      <svg class="spinner-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9"/></svg>
    </button>
  </form>

</div>

<audio id="audioPlayer" hidden></audio>

<script src="/static/script.js"></script>

</body>
</html>
